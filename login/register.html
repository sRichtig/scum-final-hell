<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="img/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
<link rel="shortcut icon" href="img/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />

<title>Final Hell SCUM RP - Registrierung</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@font-face {
font-family: test;
src: url(fonts/fonnts.com-Rigid_Square_Regular.otf);
}

body{
font-family:test;
background-color:black;
}

h2{
background-color:#444;
padding:2px 0 2px 15px;
border-radius:5px;
}

.card{
margin-left:25px;
margin-right:25px;
}

.top{
animation-name:fade;
animation-timing-function:ease-in-out;
animation-iteration-count:1;
animation-duration:1s;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:url("img/maschendrahtzaun_optimiert.png");
background-repeat:repeat;
opacity:0.05;
pointer-events:none;
z-index:-1;
}

@keyframes fade{
0%{opacity:0;}
25%{opacity:0;}
75%{opacity:1;}
100%{opacity:1;}
}

input, textarea{
margin-bottom:10px;
}

</style>
</head>

<body class="top">

<div class="container py-5 background-img">

<header class="mb-5">
<img src="img/banner.png" class="mx-auto d-block top" style="width:75%"/>
</header>

<section class="mb-4">

<center><h1>FINAL HELL - Registrierung</h1></center>
<hr/>

<h2>Neuen Account erstellen</h2>
<div class="card">
<div class="card-body">

<input type="email" id="email" class="form-control" placeholder="Email">
<input type="password" id="password" class="form-control" placeholder="Passwort">
<input type="text" id="icname" class="form-control" placeholder="IC Name">
<input type="text" id="steamid" class="form-control" placeholder="Steam ID">
<textarea id="beschreibung" class="form-control" rows="3" placeholder="Charakterbeschreibung"></textarea>

<button class="btn btn-danger w-100" onclick="register()">Registrieren</button>

<br><br>

<div class="alert alert-info" id="status">
Bitte fülle alle Felder korrekt aus.
</div>

</div>
</div>

<footer class="mt-5 pt-4 border-top">
<small>© 2026 – Final Hell SCUM RP</small>
</footer>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey: "DEIN_API_KEY",
authDomain: "DEIN_PROJEKT.firebaseapp.com",
projectId: "DEIN_PROJEKT_ID",
appId: "DEINE_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function register(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let icname = document.getElementById("icname").value;
let steamid = document.getElementById("steamid").value;
let beschreibung = document.getElementById("beschreibung").value;

if(!email || !password || !icname || !steamid || !beschreibung){
document.getElementById("status").innerHTML="Bitte fülle alle Felder aus!";
return;
}

// Firebase Auth erstellen
auth.createUserWithEmailAndPassword(email,password)
.then((userCredential)=>{
let user = userCredential.user;

// Daten in Firestore speichern
db.collection("spieler").doc(user.uid).set({
icname: icname,
steamid: steamid,
beschreibung: beschreibung,
email: email,
timestamp: firebase.firestore.FieldValue.serverTimestamp()
})
.then(()=>{
document.getElementById("status").innerHTML="Account erfolgreich erstellt! Eingeloggt als "+email;
})
.catch((error)=>{
document.getElementById("status").innerHTML="Fehler beim Speichern der Daten: "+error.message;
});

})
.catch((error)=>{
document.getElementById("status").innerHTML="Fehler: "+error.message;
});

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
